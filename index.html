="btn-done" id="doneBtn" data-i18n="done">סיימתי את העבודה</button><button class="btn-print" id="printBtn" data-i18n="print">🖨️ הדפסת כרטיס עבודה</button><span class="saving" id="savingNote"></span></div></div></div><script>const BASE="appX4z91yKZGwz6ap";const TBL="tbl5X1tEJVAAUk4uE";const H={};const HJ={"Content-Type":"application/json"};const LINKS={ cust:{tbl:"tblnCFvGEpL75AVRl",prim:"שם לקוח",mode:"live"}, veh:{tbl:"tbl9CnyPSqTookRT5",prim:"מספר רכב",mode:"live"}, part:{tbl:"tblPjXb3FN1bA7Ir6",prim:"פריט",mode:"preload"}, loc:{tbl:"tbl5Jm2ssq6kVSZFT",prim:"שם מיקום",mode:"preload"}, svc:{tbl:"tblw9CNxpIg3BZFS1",prim:"שם שירות",mode:"preload"}, emp:{tbl:"tblzY5fT9cpNSTIZY",prim:"שם מלא",mode:"preload"}};const COLOR_HEX={yellowLight2:"#ffeab6",yellowBright:"#ffba05",orangeLight2:"#fee2d5",orangeBright:"#ff6f2c",redLight2:"#ffdce5",redBright:"#f82b60",greenLight2:"#d1f7c4",greenBright:"#20c933",blueLight2:"#cfdfff",blueBright:"#2d7ff9",cyanLight2:"#d0f0fd",cyanBright:"#18bfff",tealLight2:"#c2f5e9",tealBright:"#20d9d2",pinkLight2:"#ffdaf6",pinkBright:"#ff08c2",purpleLight2:"#ede2fe",grayLight2:"#eee"};let SEL_COLORS={};function selColor(fld,v){return (SEL_COLORS[fld]&&SEL_COLORS[fld][v])||"#e8e8ea";}const recCache={cust:{},veh:{},loc:{},part:{},svc:{},emp:{}};const pickCache={};let CURRENT=null,LIST=[],CURVIEW="today";async function api(path,opt){const r=await fetch("https://abn-airtable-proxy.autocareabn.workers.dev/api/v0/"+path,opt||{headers:H});if(!r.ok)throw new Error(r.status+" "+await r.text());return r.json();}async function loadColors(){try{const s=await api("meta/bases/"+BASE+"/tables");const t=s.tables.find(x=>x.id===TBL);t.fields.forEach(f=>{if(f.options&&f.options.choices){SEL_COLORS[f.name]={};f.options.choices.forEach(c=>{SEL_COLORS[f.name][c.name]=COLOR_HEX[c.color]||"#e8e8ea";});}});}catch(e){}}const SEL_CHOICES={};async function loadChoices(){try{const s=await api("meta/bases/"+BASE+"/tables");const t=s.tables.find(x=>x.id===TBL);t.fields.forEach(f rim]):"(ללא שם)"}));list.forEach(o=>{recCache[kind][o.id]=o.name;});return list;}catch(e){return [];}}</script><script>function getDate(r){return r.fields["תאריך ושעה"]&&r.fields["תאריך ושעה"][0]||r.fields["תאריך תור (היסטורי)"]||r.fields["תאריך פתיחה"]||"";}function dstr(r){const d=getDate(r);if(!d)return"";const dt=new Date(d);if(isNaN(dt))return"";const hh=String(dt.getHours()).padStart(2,"0"),mm=String(dt.getMinutes()).padStart(2,"0");return hh+":"+mm+" "+dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();}function isToday(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();return dt.toDateString()===n.toDateString();}function isTomorrow(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();n.setDate(n.getDate()+1);return dt.toDateString()===n.toDateString();}function isFuture(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();n.setHours(0,0,0,0);return dt>n;}function txt(v){if(v==null)return"";if(Array.isArray(v))return v.filter(x=>x!=null).map(x=>typeof x==="object"?(x.name||""):x).join(", ");return String(v);}const COLS=[["תאריך",r=>dstr(r)],["מספר רכב",r=>r.fields["מספר רכב_disp"]||""],["שם לקוח",r=>r.fields["שם לקוח_disp"]||""],["סטטוס",null],["סוג טיפול",r=>txt(r.fields["סוג טיפול"])],["מכונאי אחראי",r=>r.fields["מכונאי אחראי_disp"]||""],["טלפון",r=>txt(r.fields["מספר טלפון"])],["יצרן",r=>txt(r.fields["יצרן רכב"])],["דגם",r=>txt(r.fields["דגם"])]];function curRows(){return LIST.filter(r=>{const paid=r.fields["סטטוס"]==="שולם";if(CURVIEW==="today")return isToday(r)&&!paid;if(CURVIEW==="tomorrow")return isTomorrow(r);if(CURVIEW==="future")return isFuture(r);return true;});}function renderList(){const q=(document.getElementById("search").value||"").trim();let rows=curRows();if(q)rows=rows.filter(r=>JSON.stringify(r.fields).indexOf(q)>=0);document.getElementById("thead").innerHTML="<tr>"+COLS.map(c=>"<th>"+c[0]+"</th>").join("")+"</tr>";const tb=document.getElementById("tbody");tb.innerHT   'שמפניה מטאלי':'แชมเปญเมทัลลิก','ברונזה מטאלי':'บรอนซ์เมทัลลิก',
  'ורוד':'ชมพู','ורוד פוקסיה':'ชมพูฟุกเซีย',
  'תכלת':'ฟ้า','סיאן':'ไซยาน','חאקי':'กากี',
  'חמרה (Terracotta)':'เทอร์ราคอตต้า','טורקיז EV':'เขียวฟ้า EV',
  'כרום מלא / מראה':'โครมเงา',
  'Ski Blue (Tesla Model 3 החדש)':'สกีบลู (Tesla Model 3 ใหม่)',
  // picker states
  'מחפש...':'กำลังค้นหา...','אין תוצאות':'ไม่มีผลลัพธ์','(ללא שם)':'(ไม่มีชื่อ)'
};

function getDictForLang(lang){
  if(lang==='en') return HE2EN;
  if(lang==='th') return HE2TH;
  return null;
}

// ===== 3. APPLY FULL MODAL TRANSLATION =====
function fixSelectValues(container){
  // Lock in Hebrew values on options that have no explicit value attr
  // This prevents textContent translation from breaking Airtable writes
  container.querySelectorAll('select option').forEach(function(opt){
    if(!opt.hasAttribute('value') || opt.getAttribute('value')===''){
      var txt = opt.textContent.trim();
      if(txt && txt !== '— לא נבחר —') opt.setAttribute('value', txt);
    }
  });
}

function applyModalTrans(lang){
  var d = getDictForLang(lang);
  if(!d) return;
  var modal = document.querySelector('.modal');
  if(!modal) return;

  // --- 3a. Field labels ---
  modal.querySelectorAll('.fld label').forEach(function(lbl){
    var txtNode = null, origTxt = '';
    lbl.childNodes.forEach(function(n){
      if(n.nodeType===3 && n.textContent.trim()){
        if(!txtNode){ txtNode = n; origTxt = n.textContent.trim(); }
      }
    });
    if(!origTxt || !txtNode) return;
    // Store Hebrew original on first translation
    if(!lbl.dataset.heOrig) lbl.dataset.heOrig = origTxt;
    var key = lbl.dataset.heOrig;
    var t = d[key];
    if(t) txtNode.textContent = t + ' ';
  });

  // --- 3b. Read-only tags ---
  modal.querySelectorAll('.ro-tag').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3c. Notes (automation note under status) ---
  modal.querySelectorAll('.note').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3d. Select options (status, service type, inspection values) ---
  fixSelectValues(modal);
  modal.querySelectorAll('select option').forEach(function(opt){
    // Use value attr (which is now the Hebrew text) as lookup key
    var heKey = opt.getAttribute('value') || '';
    if(!heKey) {
      // Placeholder option — translate text
      var t = d[opt.textContent.trim()];
      if(t) opt.textContent = t;
    } else {
      var t = d[heKey];
      if(t) opt.textContent = t;
    }
  });

  // --- 3e. Status pill (read-only status display) ---
  modal.querySelectorAll('.statuspill').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3f. Picker search placeholder text ---
  modal.querySelectorAll('.pickwrap input').forEach(function(inp){
    if(lang==='en') inp.placeholder = 'Search...';
    else if(lang==='th') inp.placeholder = 'ค้นหา...';
    else inp.placeholder = 'חיפוש...';
  });

  // --- 3g. Camera / upload button ---
  modal.querySelectorAll('.cam-btn').forEach(function(btn){
    var txt = d['צלם / העלה תמונה'];
    if(txt) btn.innerHTML = '📷 ' + txt;
  });

  // --- 3h. Modal title prefix ---
  var titleEl = document.getElementById('recTitle');
  var _curRec = (typeof CURRENT !== 'undefined') ? CURRENT : (window.CURRENT || null);
  if(titleEl && _curRec){
    var f = _curRec.fields;
    var num = f['מספר כרטיס עבודה'] || '';
    var custId = (f['שם לקוח']||[])[0];
    var custName = (window.recCache && window.recCache.cust && custId && window.recCache.cust[custId]) || '';
    var pfx = d['כרטיס עבודה'] || 'Work Card';
    titleEl.textContent = pfx + ' #' + num + (custName ? ' · ' + custName : '');
  }

  // --- 3i. Read-only value fields (roval) — e.g. color, year ---
  modal.querySelectorAll('.roval').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var orig = el.dataset.heOrig;
    if(!orig || orig === '—') return;
    if(!/[֐-׿]/.test(orig)) return; // skip non-Hebrew (years, names, etc.)
    var t = d[orig];
    if(t) el.textContent = t;
  });
}

// ===== 4. LANG SWITCH — RE-RENDER MODAL =====
// When user switches language and modal is open, rebuild modal content (fresh Hebrew)
// then apply translation. This avoids double-translation issues.
var _prevSL2 = window.setLang;
window.setLang = function(lang){
  var modalOpen = document.getElementById('overlay') && document.getElementById('overlay').classList.contains('show');
  var curId = modalOpen && window.CURRENT ? window.CURRENT.id : null;
  _prevSL2.apply(this, arguments);
  if(curId){
    // Re-open to get fresh Hebrew base, wrapper will auto-translate
    window.openRec(curId);
  }
};

// ===== 5. STATS TRANSLATION (in case v15 missed Hebrew labels) =====
var _prevRS = window.renderStats;
if(typeof _prevRS === 'function'){
  window.renderStats = function(){
    _prevRS.apply(this, arguments);
    var d = getDictForLang(window.LANG);
    if(!d) return;
    document.querySelectorAll('#statRow .l').forEach(function(el){
      if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
      var t = d[el.dataset.heOrig];
      if(t) el.textContent = t;
    });
  };
}

// ===== 6. PICKER DROPDOWN — translate search placeholder globally =====
// When picker search opens, ensure placeholder is in current lang
document.addEventListener('focusin', function(e){
  if(e.target && e.target.closest && e.target.closest('.pickwrap input')){
    var inp = e.target;
    if(window.LANG === 'en') inp.placeholder = 'Search...';
    else if(window.LANG === 'th') inp.placeholder = 'ค้นหา...';
    else inp.placeholder = 'חיפוש...';
  }
});

// ===== 7. MECHANIC → STATUS AUTO-UPDATE =====
var _prevAddLink = window.addLink;
window.addLink = async function(optEl){
  var box = optEl && optEl.closest ? optEl.closest('.linkbox') : null;
  var field = box ? box.dataset.field : '';
  await _prevAddLink.apply(this, arguments);
  if(field === 'מכונאי אחראי'){
    var cur = (typeof CURRENT !== 'undefined') ? CURRENT : null;
    if(cur && cur.fields){
      // Set work start time if not already recorded
      if(!cur.fields['תאריך פתיחה']){
        await patchField('תאריך פתיחה', new Date().toISOString());
      }
      // Move status to "In service" if not already
      if(cur.fields['סטטוס'] !== 'בטיפול'){
        var ok = await patchField('סטטוס', 'בטיפול');
        if(ok){
          var pill = document.querySelector('.modal .statuspill');
          if(pill){
            pill.dataset.heOrig = 'בטיפול';
            pill.textContent = 'בטיפול';
            pill.style.background = (typeof selColor === 'function') ? selColor('סטטוס','בטיפול') : '#d1f7c4';
            var lang = window.LANG || (typeof LANG !== 'undefined' ? LANG : 'he');
            if(lang && lang !== 'he') applyModalTrans(lang);
          }
          if(typeof renderList === 'function') renderList();
        }
      }
    }
  }
};

})(); /* end v16 addon */

</script>
