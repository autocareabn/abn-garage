<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ABN - מערכת ניהול מוסך</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#f7f7f8;color:#1d1f25;direction:rtl}.app{display:flex;min-height:100vh}.sidebar{width:230px;background:#c8102e;color:#fff;flex:0 0 230px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-size:20px;font-weight:700;padding:18px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.2)}.brand small{display:block;font-size:11px;font-weight:400;opacity:.85}.nav a{display:block;padding:11px 18px;color:#fff;text-decoration:none;font-size:14px;cursor:pointer;border-right:3px solid transparent}.nav a:hover{background:rgba(0,0,0,.12)}.nav a.active{background:rgba(0,0,0,.18);border-right-color:#fff;font-weight:600}.nav .grp{padding:14px 18px 4px;font-size:11px;text-transform:uppercase;opacity:.7;letter-spacing:.5px}.main{flex:1;overflow:auto}.topbar{background:#fff;border-bottom:1px solid #e6e6ea;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}.topbar h1{font-size:18px;font-weight:700}.topbar h1 small{font-size:12px;font-weight:400;color:#888;display:block}.tb-actions{display:flex;gap:8px;align-items:center}.btn{border:none;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600}.btn-gray{background:#ececed;color:#333}.content{padding:22px}.stat-row{display:flex;gap:16px;margin-bottom:18px}.card{background:#fff;border:1px solid #e6e6ea;border-radius:10px}.stat{flex:1;padding:18px;text-align:center}.stat .n{font-size:30px;font-weight:800;color:#c8102e}.stat .l{font-size:13px;color:#666;margin-top:4px}.search{flex:1;max-width:340px;padding:9px 12px;border:1px solid #d6d6db;border-radius:8px;font-size:14px}table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}th,td{padding:10px 12px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap}th{background:#fafafa;color:#555;font-weight:600;position:sticky;top:0}tr:hover td{background:#fcfcfd;cursor:pointer}.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 0}.overlay.show{display:flex}.modal{background:#fff;width:min(960px,94vw);border-radius:12px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}.modal-head{padding:16px 22px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:5;border-radius:12px 12px 0 0}.modal-head h2{font-size:17px}.x{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}.tabs{display:flex;gap:4px;padding:10px 22px 0;border-bottom:1px solid #eee;background:#fff;position:sticky;top:55px;z-index:4;flex-wrap:wrap}.tabs button{background:none;border:none;padding:9px 16px;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;color:#555}.tabs button.active{color:#c8102e;border-bottom-color:#c8102e;font-weight:700}.tabpane{display:none;padding:20px 22px}.tabpane.active{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 22px}.fld{display:flex;flex-direction:column;gap:5px}.fld.full{grid-column:1/-1}.fld label{font-size:12px;color:#777;font-weight:600;display:flex;align-items:center;gap:6px;justify-content:flex-end}.fld .ro-tag{background:#eee;color:#999;font-size:10px;padding:1px 7px;border-radius:4px;font-weight:600}.fld input[type=text],.fld input[type=number],.fld input[type=date],.fld select,.fld textarea{padding:9px 11px;border:1px solid #d6d6db;border-radius:7px;font-size:14px;width:100%;font-family:inherit;text-align:right;background:#fff}.fld textarea{min-height:70px;resize:vertical}.fld .roval{padding:9px 11px;background:#f5f5f6;border:1px solid #eee;border-radius:7px;font-size:14px;color:#444;min-height:38px}.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#c8102e}.chk{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding:6px 0}.chk input{width:18px;height:18px;cursor:pointer}.statuspill{display:inline-block;padding:5px 14px;border-radius:8px;font-weight:700;font-size:14px;color:#1d1f25}.saving{font-size:12px;color:#0a8a0a;margin-right:8px}.saving.err{color:#c8102e}.linkbox{border:1px solid #d6d6db;border-radius:7px;padding:7px;display:flex;flex-direction:column;gap:6px;background:#fff}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{background:#eef1ff;border:1px solid #ccd6ff;color:#2b3a8f;border-radius:14px;padding:3px 9px;font-size:13px;display:flex;align-items:center;gap:6px}.chip .rm{cursor:pointer;color:#888;font-weight:700}.pickwrap{position:relative}.pickwrap input{width:100%;padding:7px 10px;border:1px solid #e2e2e7;border-radius:6px;font-size:13px}.dropdown{position:absolute;top:100%;right:0;left:0;background:#fff;border:1px solid #d6d6db;border-radius:7px;margin-top:3px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.15);display:none}.dropdown.show{display:block}.dropdown .opt{padding:8px 11px;font-size:13px;cursor:pointer;border-bottom:1px solid #f2f2f2}.dropdown .opt:hover{background:#f3f6ff}.photo-area{display:flex;flex-direction:column;gap:8px}.photo-thumbs{display:flex;flex-wrap:wrap;gap:8px}.photo-thumbs img{width:74px;height:74px;object-fit:cover;border-radius:8px;border:1px solid #ddd}.cam-btn{background:#1d6fe0;color:#fff;border:none;border-radius:7px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;align-self:flex-start}.modal-foot{padding:16px 22px;border-top:1px solid #eee;display:flex;justify-content:flex-start;gap:10px;position:sticky;bottom:0;background:#fff;border-radius:0 0 12px 12px}.btn-done{background:#c8102e;color:#fff;border:none;border-radius:7px;padding:11px 22px;font-size:15px;font-weight:700;cursor:pointer}.btn-print{background:#fff;color:#333;border:1px solid #cfcfd4;border-radius:7px;padding:11px 22px;font-size:15px;font-weight:600;cursor:pointer}.note{font-size:11px;color:#999;margin-top:2px}.langbar{display:flex;gap:4px;align-items:center;margin-left:10px}.langbar button{border:1px solid #cfcfd4;background:#fff;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}.langbar button.active{background:#c8102e;color:#fff;border-color:#c8102e}.menu-toggle{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:4px 6px;color:#1d1f25;line-height:1;align-self:center}@media(max-width:768px){.menu-toggle{display:block}.sidebar{position:fixed;right:-230px;top:0;height:100%;z-index:200;transition:right .25s;overflow-y:auto}.sidebar.open{right:0;box-shadow:-4px 0 20px rgba(0,0,0,.3)}.sidebar-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}.sidebar-ov.show{display:block}.topbar{padding:10px 12px;flex-wrap:wrap;gap:6px}.topbar h1{font-size:15px;flex:1;min-width:0}.topbar h1 small{font-size:10px}.tb-actions{width:100%;flex-wrap:wrap;gap:6px}.search{flex:1;min-width:100px;max-width:none}.langbar{margin-left:0!important}.content{padding:10px}.stat-row{overflow-x:auto;flex-wrap:nowrap;gap:10px;padding-bottom:2px}.stat{min-width:80px;flex:0 0 auto;padding:10px 6px}.stat .n{font-size:20px}table{font-size:12px}th,td{padding:7px 8px}.overlay{padding:0}.modal{width:100vw;max-width:100vw;border-radius:0;margin:0}.modal-head{border-radius:0;padding:12px 14px}.modal-head h2{font-size:14px}.tabs{padding:6px 10px 0;gap:0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}.tabs button{padding:8px 12px;font-size:13px;white-space:nowrap;flex-shrink:0}.tabpane{padding:14px 12px}.grid{grid-template-columns:1fr!important}.fld.full{grid-column:auto}.modal-foot{padding:10px 12px;flex-wrap:wrap}.btn-done,.btn-print{padding:9px 14px;font-size:14px;flex:1}}@media(min-width:769px)and(max-width:1024px){.sidebar{width:190px;flex:0 0 190px}.modal{width:min(820px,96vw)}}</style></head><body><div class="app"><div class="sidebar-ov" id="sidebarOv"></div><div class="sidebar"> <div class="brand">🔧 ABN מוסך<small>מערכת ניהול מוסך</small></div> <div class="nav"> <div class="grp" data-i18n="grp_work">ניהול עבודה</div> <a data-view="today" class="active" data-i18n="nav_today">📅 היום במוסך</a> <a data-view="tomorrow" data-i18n="nav_tomorrow">➡️ מחר במוסך</a> <a data-view="future" data-i18n="nav_future">⏱️ טיפולים עתידיים</a> </div></div><div class="main"> <div class="topbar"><button class="menu-toggle" id="menuToggle">☰</button> <h1 id="viewTitle">היום במוסך<small id="viewSub" data-i18n="sub">מערכת ניהול מוסך ABN · חיבור חי ל-Airtable</small></h1> <div class="tb-actions"><input class="search" id="search" placeholder="חיפוש..." data-i18n-ph="search"><button class="btn btn-gray" id="refreshBtn" data-i18n="refresh">🔄 רענן</button><span class="langbar"><button data-lang="he" class="active">עברית</button><button data-lang="en">EN</button><button data-lang="th">ไทย</button></span></div> </div> <div class="content"> <div class="stat-row" id="statRow"></div> <div class="card" style="overflow:auto"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div> </div></div></div><div class="overlay" id="overlay"><div class="modal"> <div class="modal-head"><h2 id="recTitle" data-i18n="card">כרטיס עבודה</h2><button class="x" id="closeBtn">×</button></div> <div class="tabs" id="recTabs"><button data-tab="intake" class="active" data-i18n="t_intake">פרטי קליטה</button><button data-tab="treat" data-i18n="t_treat">תהליך הטיפול</button><button data-tab="inspect" data-i18n="t_inspect">בדיקות</button></div> <div id="paneIntake" class="tabpane active"></div><div id="paneTreat" class="tabpane"></div><div id="paneInspect" class="tabpane"></div> <div class="modal-foot"><button class="btn-done" id="doneBtn" data-i18n="done">סיימתי את העבודה</button><button class="btn-print" id="printBtn" data-i18n="print">🖨️ הדפסת כרטיס עבודה</button><span class="saving" id="savingNote"></span></div></div></div><script>const PAT="patzTcvw86aySgYQW.e588ae99f3c6f0cf294b117531d9336236a2421c11c69a89da68fefdd4262d7c";const BASE="appX4z91yKZGwz6ap";const TBL="tbl5X1tEJVAAUk4uE";const H={Authorization:"Bearer "+PAT};const HJ={Authorization:"Bearer "+PAT,"Content-Type":"application/json"};const LINKS={ cust:{tbl:"tblnCFvGEpL75AVRl",prim:"שם לקוח",mode:"live"}, veh:{tbl:"tbl9CnyPSqTookRT5",prim:"מספר רכב",mode:"live"}, part:{tbl:"tblPjXb3FN1bA7Ir6",prim:"פריט",mode:"live"}, loc:{tbl:"tbl5Jm2ssq6kVSZFT",prim:"שם מיקום",mode:"preload"}, svc:{tbl:"tblw9CNxpIg3BZFS1",prim:"שם שירות",mode:"preload"}, emp:{tbl:"tblzY5fT9cpNSTIZY",prim:"שם מלא",mode:"preload"}};const COLOR_HEX={yellowLight2:"#ffeab6",yellowBright:"#ffba05",orangeLight2:"#fee2d5",orangeBright:"#ff6f2c",redLight2:"#ffdce5",redBright:"#f82b60",greenLight2:"#d1f7c4",greenBright:"#20c933",blueLight2:"#cfdfff",blueBright:"#2d7ff9",cyanLight2:"#d0f0fd",cyanBright:"#18bfff",tealLight2:"#c2f5e9",tealBright:"#20d9d2",pinkLight2:"#ffdaf6",pinkBright:"#ff08c2",purpleLight2:"#ede2fe",grayLight2:"#eee"};let SEL_COLORS={};function selColor(fld,v){return (SEL_COLORS[fld]&&SEL_COLORS[fld][v])||"#e8e8ea";}const recCache={cust:{},veh:{},loc:{},part:{},svc:{},emp:{}};const pickCache={};let CURRENT=null,LIST=[],CURVIEW="today";async function api(path,opt){const r=await fetch("https://api.airtable.com/v0/"+path,opt||{headers:H});if(!r.ok)throw new Error(r.status+" "+await r.text());return r.json();}async function loadColors(){try{const s=await api("meta/bases/"+BASE+"/tables");const t=s.tables.find(x=>x.id===TBL);t.fields.forEach(f=>{if(f.options&&f.options.choices){SEL_COLORS[f.name]={};f.options.choices.forEach(c=>{SEL_COLORS[f.name][c.name]=COLOR_HEX[c.color]||"#e8e8ea";});}});}catch(e){}}const SEL_CHOICES={};async function loadChoices(){try{const s=await api("meta/bases/"+BASE+"/tables");const t=s.tables.find(x=>x.id===TBL);t.fields.forEach(f=>{if(f.options&&f.options.choices)SEL_CHOICES[f.name]=f.options.choices.map(c=>c.name);});}catch(e){}}async function fetchAll(){let recs=[],offset;do{let u=BASE+"/"+TBL+"?pageSize=100&cellFormat=json";if(offset)u+="&offset="+offset;const d=await api(u);recs=recs.concat(d.records);offset=d.offset;}while(offset);return recs;}async function loadPicker(kind){if(pickCache[kind])return pickCache[kind];const L=LINKS[kind];let recs=[],offset;do{let u=BASE+"/"+L.tbl+"?pageSize=100";if(offset)u+="&offset="+offset;const d=await api(u);recs=recs.concat(d.records);offset=d.offset;}while(offset);pickCache[kind]=recs.map(r=>({id:r.id,name:r.fields[L.prim]!=null?String(r.fields[L.prim]):"(ללא שם)"}));pickCache[kind].forEach(o=>{recCache[kind][o.id]=o.name;});return pickCache[kind];}async function resolveLink(kind,id){if(recCache[kind][id]!==undefined)return recCache[kind][id];try{const L=LINKS[kind];const r=await fetch("https://api.airtable.com/v0/"+BASE+"/"+L.tbl+"/"+id,{headers:H});if(!r.ok){recCache[kind][id]="(רשומה מקושרת)";return recCache[kind][id];}const d=await r.json();recCache[kind][id]=d.fields[L.prim]!=null?String(d.fields[L.prim]):"(ללא שם)";}catch(e){recCache[kind][id]="(רשומה מקושרת)";}return recCache[kind][id];}async function resolveIds(kind,ids){await Promise.all((ids||[]).map(id=>resolveLink(kind,id)));}async function searchLink(kind,q){const L=LINKS[kind];const safe=String(q||"").replace(/'/g,"\\'");let url=BASE+"/"+L.tbl+"?pageSize=20";if(safe)url+="&filterByFormula="+encodeURIComponent("SEARCH('"+safe+"',{"+L.prim+"}&'')>0");try{const d=await api(url);const list=d.records.map(r=>({id:r.id,name:r.fields[L.prim]!=null?String(r.fields[L.prim]):"(ללא שם)"}));list.forEach(o=>{recCache[kind][o.id]=o.name;});return list;}catch(e){return [];}}</script><script>function getDate(r){return r.fields["תאריך ושעה"]&&r.fields["תאריך ושעה"][0]||r.fields["תאריך תור (היסטורי)"]||r.fields["תאריך פתיחה"]||"";}function dstr(r){const d=getDate(r);if(!d)return"";const dt=new Date(d);if(isNaN(dt))return"";const hh=String(dt.getHours()).padStart(2,"0"),mm=String(dt.getMinutes()).padStart(2,"0");return hh+":"+mm+" "+dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();}function isToday(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();return dt.toDateString()===n.toDateString();}function isTomorrow(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();n.setDate(n.getDate()+1);return dt.toDateString()===n.toDateString();}function isFuture(r){const d=getDate(r);if(!d)return false;const dt=new Date(d),n=new Date();n.setHours(0,0,0,0);return dt>n;}function txt(v){if(v==null)return"";if(Array.isArray(v))return v.filter(x=>x!=null).map(x=>typeof x==="object"?(x.name||""):x).join(", ");return String(v);}const COLS=[["תאריך",r=>dstr(r)],["מספר רכב",r=>r.fields["מספר רכב_disp"]||""],["שם לקוח",r=>r.fields["שם לקוח_disp"]||""],["סטטוס",null],["סוג טיפול",r=>txt(r.fields["סוג טיפול"])],["מכונאי אחראי",r=>r.fields["מכונאי אחראי_disp"]||""],["טלפון",r=>txt(r.fields["מספר טלפון"])],["יצרן",r=>txt(r.fields["יצרן רכב"])],["דגם",r=>txt(r.fields["דגם"])]];function curRows(){return LIST.filter(r=>{if(CURVIEW==="today")return isToday(r);if(CURVIEW==="tomorrow")return isTomorrow(r);if(CURVIEW==="future")return isFuture(r);return true;});}function renderList(){const q=(document.getElementById("search").value||"").trim();let rows=curRows();if(q)rows=rows.filter(r=>JSON.stringify(r.fields).indexOf(q)>=0);document.getElementById("thead").innerHTML="<tr>"+COLS.map(c=>"<th>"+c[0]+"</th>").join("")+"</tr>";const tb=document.getElementById("tbody");tb.innerHTML="";rows.forEach(r=>{const tr=document.createElement("tr");tr.onclick=()=>openRec(r.id);COLS.forEach(c=>{const td=document.createElement("td");if(c[0]==="סטטוס"){const v=txt(r.fields["סטטוס"]);td.innerHTML='<span class="pill" style="background:'+selColor("ס   'פילטר שמן אלפא רומאו':'กรองน้ำมัน อัลฟ่า','משולש ניסן מיקרה':'ปีกนก นิสสัน',
  'פילטר אויר מיצוביש אקליפסה':'กรองอากาศ มิตซู',

  'כרטיס עבודה':'ใบงาน',

  'נשמר ב-Airtable':'บันทึกแล้ว','מסיים עבודה...':'กำลังจบงาน...',

  'התמונה הועלתה':'อัพโหลดแล้ว','שגיאה בשמירה':'ผิดพลาด',

  // view titles
  'היום במוסך':'วันนี้ที่อู่','מחר במוסך':'พรุ่งนี้ที่อู่','טיפולים עתידיים':'งานอนาคต'
};

function getDictForLang(lang){
  if(lang==='en') return HE2EN;
  if(lang==='th') return HE2TH;
  return null;
}

// ===== 3. APPLY FULL MODAL TRANSLATION =====
function fixSelectValues(container){
  // Lock in Hebrew values on options that have no explicit value attr
  // This prevents textContent translation from breaking Airtable writes
  container.querySelectorAll('select option').forEach(function(opt){
    if(!opt.hasAttribute('value') || opt.getAttribute('value')===''){
      var txt = opt.textContent.trim();
      if(txt && txt !== '— לא נבחר —') opt.setAttribute('value', txt);
    }
  });
}

function applyModalTrans(lang){
  var d = getDictForLang(lang);
  if(!d) return;
  var modal = document.querySelector('.modal');
  if(!modal) return;

  // --- 3a. Field labels ---
  modal.querySelectorAll('.fld label').forEach(function(lbl){
    var txtNode = null, origTxt = '';
    lbl.childNodes.forEach(function(n){
      if(n.nodeType===3 && n.textContent.trim()){
        if(!txtNode){ txtNode = n; origTxt = n.textContent.trim(); }
      }
    });
    if(!origTxt || !txtNode) return;
    // Store Hebrew original on first translation
    if(!lbl.dataset.heOrig) lbl.dataset.heOrig = origTxt;
    var key = lbl.dataset.heOrig;
    var t = d[key];
    if(t) txtNode.textContent = t + ' ';
  });

  // --- 3b. Read-only tags ---
  modal.querySelectorAll('.ro-tag').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3c. Notes (automation note under status) ---
  modal.querySelectorAll('.note').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3d. Select options (status, service type, inspection values) ---
  fixSelectValues(modal);
  modal.querySelectorAll('select option').forEach(function(opt){
    // Use value attr (which is now the Hebrew text) as lookup key
    var heKey = opt.getAttribute('value') || '';
    if(!heKey) {
      // Placeholder option — translate text
      var t = d[opt.textContent.trim()];
      if(t) opt.textContent = t;
    } else {
      var t = d[heKey];
      if(t) opt.textContent = t;
    }
  });

  // --- 3e. Status pill (read-only status display) ---
  modal.querySelectorAll('.statuspill').forEach(function(el){
    if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
    var t = d[el.dataset.heOrig];
    if(t) el.textContent = t;
  });

  // --- 3f. Picker search placeholder text ---
  modal.querySelectorAll('.pickwrap input').forEach(function(inp){
    if(lang==='en') inp.placeholder = 'Search...';
    else if(lang==='th') inp.placeholder = 'ค้นหา...';
    else inp.placeholder = 'חיפוש...';
  });

  // --- 3g. Camera / upload button ---
  modal.querySelectorAll('.cam-btn').forEach(function(btn){
    var txt = d['צלם / העלה תמונה'];
    if(txt) btn.innerHTML = '📷 ' + txt;
  });

  // --- 3h. Modal title prefix ---
  var titleEl = document.getElementById('recTitle');
  var _curRec = (typeof CURRENT !== 'undefined') ? CURRENT : (window.CURRENT || null);
  if(titleEl && _curRec){
    var f = _curRec.fields;
    var num = f['מספר כרטיס עבודה'] || '';
    var custId = (f['שם לקוח']||[])[0];
    var custName = (window.recCache && window.recCache.cust && custId && window.recCache.cust[custId]) || '';
    var pfx = d['כרטיס עבודה'] || 'Work Card';
    titleEl.textContent = pfx + ' #' + num + (custName ? ' · ' + custName : '');
  }
}

// ===== 4. LANG SWITCH — RE-RENDER MODAL =====
// When user switches language and modal is open, rebuild modal content (fresh Hebrew)
// then apply translation. This avoids double-translation issues.
var _prevSL2 = window.setLang;
window.setLang = function(lang){
  var modalOpen = document.getElementById('overlay') && document.getElementById('overlay').classList.contains('show');
  var curId = modalOpen && window.CURRENT ? window.CURRENT.id : null;
  _prevSL2.apply(this, arguments);
  if(curId){
    // Re-open to get fresh Hebrew base, wrapper will auto-translate
    window.openRec(curId);
  }
};

// ===== 5. STATS TRANSLATION (in case v15 missed Hebrew labels) =====
var _prevRS = window.renderStats;
if(typeof _prevRS === 'function'){
  window.renderStats = function(){
    _prevRS.apply(this, arguments);
    var d = getDictForLang(window.LANG);
    if(!d) return;
    document.querySelectorAll('#statRow .l').forEach(function(el){
      if(!el.dataset.heOrig) el.dataset.heOrig = el.textContent.trim();
      var t = d[el.dataset.heOrig];
      if(t) el.textContent = t;
    });
  };
}

// ===== 6. PICKER DROPDOWN — translate search placeholder globally =====
// When picker search opens, ensure placeholder is in current lang
document.addEventListener('focusin', function(e){
  if(e.target && e.target.closest && e.target.closest('.pickwrap input')){
    var inp = e.target;
    if(window.LANG === 'en') inp.placeholder = 'Search...';
    else if(window.LANG === 'th') inp.placeholder = 'ค้นหา...';
    else inp.placeholder = 'חיפוש...';
  }
});

// ===== 7. MECHANIC → STATUS AUTO-UPDATE =====
var _prevAddLink = window.addLink;
window.addLink = async function(optEl){
  var box = optEl && optEl.closest ? optEl.closest('.linkbox') : null;
  var field = box ? box.dataset.field : '';
  await _prevAddLink.apply(this, arguments);
  if(field === 'מכונאי אחראי'){
    var cur = (typeof CURRENT !== 'undefined') ? CURRENT : null;
    if(cur && cur.fields && cur.fields['סטטוס'] !== 'בטיפול'){
      var ok = await patchField('סטטוס', 'בטיפול');
      if(ok){
        var pill = document.querySelector('.modal .statuspill');
        if(pill){
          pill.dataset.heOrig = 'בטיפול';
          pill.textContent = 'בטיפול';
          pill.style.background = (typeof selColor === 'function') ? selColor('סטטוס','בטיפול') : '#d1f7c4';
          var lang = window.LANG || (typeof LANG !== 'undefined' ? LANG : 'he');
          if(lang && lang !== 'he') applyModalTrans(lang);
        }
        if(typeof renderList === 'function') renderList();
      }
    }
  }
};

})(); /* end v16 addon */

</script>
